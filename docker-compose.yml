services:
  postgres:
    image: postgres:16-alpine
    container_name: autocure-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-selfhealer}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-selfhealer}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: autocure-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  autocure:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: autocure-app
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    env_file:
      - .env
    environment:
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 9292
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      WAIT_FOR_SERVICES_TIMEOUT: 120
    volumes:
      - ./logs:/app/logs
      - ./temp:/app/temp
      - ./repos:/app/repos
      - ./data:/app/data
      - ./reports:/app/reports
    ports:
      - "9292:9292"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9292/health', timeout=3).read()"]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
  redis_data:
