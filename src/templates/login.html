<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | AutoCure</title>
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="login-body">
  <div class="login-card">
    <div class="login-brand">
      <i class="ph ph-first-aid-kit"></i>
      <h1>AutoCure</h1>
      <p>Self-Healing Software System</p>
    </div>
    {% if error %}
    <div class="alert alert-danger">
      <i class="ph ph-warning-circle"></i>
      {{ error }}
    </div>
    {% endif %}
    <form method="POST" action="/login">
      <div class="form-group">
        <label class="form-label"><i class="ph ph-user"></i> Username</label>
        <input type="text" name="username" class="form-input" placeholder="Enter username" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label"><i class="ph ph-lock"></i> Password</label>
        <input type="password" name="password" class="form-input" placeholder="Enter password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block">
        <i class="ph ph-sign-in"></i> Sign In
      </button>
    </form>
    <p style="text-align:center;margin-top:20px;font-size:12px;color:var(--text-muted);">
      Default credentials: admin / admin
    </p>
  </div>
  <script src="/static/js/app.js"></script>
</body>
</html>
