<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | AutoCure</title>
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="login-body">
  <div class="login-card">
    <div class="login-brand">
      <i class="ph ph-first-aid-kit"></i>
      <h1>AutoCure</h1>
      <p>Create your account</p>
    </div>
    {% if error %}
    <div class="alert alert-danger">
      <i class="ph ph-warning-circle"></i>
      {{ error }}
    </div>
    {% endif %}
    <form method="POST" action="/signup">
      <div class="form-group">
        <label class="form-label"><i class="ph ph-user"></i> Username</label>
        <input type="text" name="username" class="form-input" placeholder="Choose a username" required autofocus minlength="3">
      </div>
      <div class="form-group">
        <label class="form-label"><i class="ph ph-lock"></i> Password</label>
        <input type="password" name="password" class="form-input" placeholder="Choose a password" required minlength="4">
      </div>
      <button type="submit" class="btn btn-primary btn-block">
        <i class="ph ph-user-plus"></i> Create Account
      </button>
    </form>
    <p style="text-align:center;margin-top:16px;font-size:13px;color:var(--text-secondary);">
      Already have an account? <a href="/login" style="color:var(--accent);text-decoration:underline;">Sign in</a>
    </p>
  </div>
  <script src="/static/js/app.js"></script>
</body>
</html>
